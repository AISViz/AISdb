name: Pipeline

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  pguser: "postgres"
  pghost: "127.0.0.1"
  pgpass: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aisdb_lib/target
            database_server/target
          key: rust-${{ runner.os }}-${{ hashFiles('aisdb_lib/Cargo.lock', 'database_server/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting (aisdb_lib)
        working-directory: aisdb_lib
        run: cargo fmt --check

      - name: Clippy (aisdb_lib)
        working-directory: aisdb_lib
        run: cargo clippy --features sqlite,postgres -- -D warnings

      - name: Test (aisdb_lib)
        working-directory: aisdb_lib
        run: cargo test --features sqlite,postgres

      - name: Check (database_server)
        working-directory: database_server
        run: cargo check

  sdist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  wheels:
    needs: [sdist]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo home
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack wasm-bindgen-cli wasm-opt

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          container: 'off'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  wheel-smoke:
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download linux wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Install wheel with uv
        run: |
          python -m pip install --upgrade uv
          uv venv --python 3.10
          uv pip install dist/*cp310*.whl
          uv run --no-project python -c "import aisdb; print(aisdb.__version__)"

      - name: Check distribution metadata
        run: uvx twine check dist/*

  docs:
    runs-on: ubuntu-latest
    needs: [wheels]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download linux wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist

      - name: Install aisdb and Sphinx
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*cp310*.whl
          python -m pip install sphinx sphinx-rtd-theme

      - name: Build documentation
        shell: bash
        run: |
          set -o pipefail
          sphinx-apidoc --separate --force --implicit-namespaces --module-first -o docs/source/api aisdb aisdb/tests/*
          # sphinx-build (unlike python -m sphinx) does not prepend the repo
          # root to sys.path, so autodoc imports the installed wheel instead
          # of the sourcedir that lacks the compiled extension
          sphinx-build -b html docs/source /tmp/docs-out 2>&1 | tee /tmp/sphinx-build.log
          if grep -E "failed to import" /tmp/sphinx-build.log; then
            echo "autodoc could not import aisdb modules"
            exit 1
          fi

  test-linux:
    runs-on: ubuntu-latest
    needs: [wheels]
    env:
      POSTGRES_USER: ${{ secrets.PGUSER || 'aisdb_ci' }}
      POSTGRES_PASSWORD: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
      PGPASSWORD: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache cargo home
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          source "$HOME/.cargo/env"

      - name: Install wasm-pack
        run: |
          cargo install --locked wasm-pack wasm-bindgen-cli wasm-opt
          wasm-pack --version

      - name: Setup PostgreSQL 17
        uses: ikalnytskyi/action-setup-postgres@v7
        with:
          username: ${{ env.POSTGRES_USER }}
          password: ${{ env.POSTGRES_PASSWORD }}
          database: postgres
          postgres-version: "17"
          ssl: false
        id: postgres

      - name: Test PostgreSQL connection
        run: |
          psql ${{ steps.postgres.outputs.connection-uri }} -c "SELECT 1"
          psql service=${{ steps.postgres.outputs.service-name }} -c "SELECT 1"
          psql ${{ steps.postgres.outputs.connection-uri }} -c 'SHOW config_file'
          psql ${{ steps.postgres.outputs.connection-uri }} -c "CREATE ROLE postgres WITH LOGIN SUPERUSER PASSWORD '${{ env.POSTGRES_PASSWORD }}';"

      - name: Add TimescaleDB package
        run: |
          echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -c -s) main" | sudo tee /etc/apt/sources.list.d/timescaledb.list
          wget --quiet -O - https://packagecloud.io/timescale/timescaledb/gpgkey | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/timescaledb.gpg
          sudo apt-get update -y

      - name: Install TimescaleDB extension
        run: |
          sudo apt-get install -y timescaledb-2-postgresql-17 postgresql-client-17
          echo "TimescaleDB extension installed"

      - name: Enable TimescaleDB in PostgreSQL config
        run: |
          CONFIG_PATH=$(sudo -u postgres psql ${{ steps.postgres.outputs.connection-uri }} -Atc "SHOW config_file;")
          sudo bash -c "echo \"shared_preload_libraries = 'timescaledb'\" >> $CONFIG_PATH"
          echo "TimescaleDB preloaded in $CONFIG_PATH"

      - name: Restart PostgreSQL
        run: |
          pg_ctl restart --pgdata="/home/runner/work/_temp/pgdata"
          sleep 5

      - name: Create TimescaleDB extension
        run: |
          sudo -u postgres psql ${{ steps.postgres.outputs.connection-uri }} -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"
          echo "TimescaleDB extension created."

      - name: Create Python virtual environment and install dependencies
        run: |
          python -m venv AISdb
          source ./AISdb/bin/activate
          python -m pip install --upgrade pip
          python -m pip install xarray
          python -m pip install maturin
          maturin develop --release --extras=test
          python -m pip install --upgrade pytest pytest-dotenv pytest-cov furl hypothesis trustme astor pyopenssl isort pydirectory

      - name: Run tests
        run: |
          source ./AISdb/bin/activate
          pytest ./aisdb/tests/ --maxfail=10 --cov=aisdb --cov-report=term

      - name: Clean up
        run: |
          rm -rf AISdb
          sudo apt-get clean

  test-macos:
    runs-on: macos-latest
    needs: [wheels]
    env:
      POSTGRES_USER: ${{ secrets.PGUSER || 'aisdb_ci' }}
      POSTGRES_PASSWORD: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
      PGPASSWORD: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache cargo home
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          source "$HOME/.cargo/env"

      - name: Install LLVM and configure clang
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          export PATH="$LLVM_PREFIX/bin:$PATH"
          export CC="$LLVM_PREFIX/bin/clang --target=wasm32-unknown-unknown"
          echo "export PATH=$PATH" >> "$GITHUB_ENV"
          echo "CC=$CC" >> "$GITHUB_ENV"

      - name: Install zlib and configure pkg-config
        run: |
          brew install zlib
          PKG_CONFIG_PATH="$(brew --prefix zlib)/lib/pkgconfig"
          export PKG_CONFIG_PATH
          echo "export PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Install wasm-pack
        run: |
          cargo install --locked wasm-pack wasm-bindgen-cli wasm-opt
          wasm-pack --version

      - name: Install PostgreSQL
        run: |
          brew update
          brew install postgresql@17
          brew link postgresql@17 --force
          brew services start postgresql@17
          brew cleanup

      - name: Check PostgreSQL version
        run: |
          brew list | grep postgresql

      - name: Configure PostgreSQL
        run: |
          psql postgres -c "CREATE ROLE postgres WITH LOGIN SUPERUSER PASSWORD '${{ env.POSTGRES_PASSWORD }}';"

      - name: Install TimescaleDB
        run: |
          brew tap timescale/tap
          brew trust timescale/tap
          brew install timescaledb
          timescaledb-tune --quiet --yes
          brew services restart postgresql@17
          brew cleanup

      - name: Setup TimescaleDB
        run: |
          TSDB_PATH=$(brew --prefix timescaledb)/bin

          if [ -f "$TSDB_PATH/timescaledb_move.sh" ]; then
            cd "$TSDB_PATH"
            ./timescaledb_move.sh
          else
            echo "Error: timescaledb_move.sh not found!"
            exit 1
          fi

          brew services restart postgresql@17
          sleep 5
          psql -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"

      - name: Create Python virtual environment and install dependencies
        run: |
          python -m venv AISdb
          source ./AISdb/bin/activate
          python -m pip install --upgrade pip
          python -m pip install xarray
          python -m pip install maturin
          maturin develop --release --extras=test
          python -m pip install --upgrade pytest pytest-dotenv pytest-cov furl hypothesis trustme astor pyopenssl isort pydirectory

      - name: Run tests
        run: |
          source ./AISdb/bin/activate
          pytest ./aisdb/tests/ --maxfail=10 --cov=aisdb --cov-report=term

      - name: Clean up
        run: |
          rm -rf AISdb

  test-windows:
    runs-on: windows-latest
    needs: [wheels]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'

      - name: Cache cargo home
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust toolchain
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack wasm-bindgen-cli wasm-opt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PostgreSQL 17
        uses: ikalnytskyi/action-setup-postgres@v7
        with:
          username: postgres
          password: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
          database: postgres
          postgres-version: "17"
          ssl: false

      - name: Verify PostgreSQL connection
        run: |
          $env:PGPASSWORD="${{ env.pgpass }}"
          Write-Host "Verifying PostgreSQL connection..."
          psql -U postgres -c "SELECT version();"
          psql -U postgres -c "SHOW config_file;"

      - name: Create Python virtual environment and install dependencies
        run: |
          python -m venv AISdb
          . AISdb\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install xarray
          python -m pip install maturin
          maturin develop --release --extras=test
          python -m pip install --upgrade pytest pytest-dotenv pytest-cov furl hypothesis trustme astor pyopenssl isort pydirectory

      - name: Run tests
        # step-level env: action-setup-postgres exports PGUSER/PGPASSWORD via
        # GITHUB_ENV, which on case-insensitive Windows clobbers the
        # workflow-level pguser/pgpass; step env wins over GITHUB_ENV
        env:
          pguser: postgres
          pgpass: ${{ secrets.PGPASS || 'aisdb_ci_pw' }}
          pghost: "127.0.0.1"
        run: |
          . AISdb\Scripts\Activate.ps1
          pytest ./aisdb/tests/ --maxfail=10 --cov=aisdb --cov-report=term

      - name: Clean up
        run: |
          Remove-Item -Recurse -Force AISdb
